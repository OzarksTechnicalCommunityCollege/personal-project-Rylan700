{% extends "base.html" %}

{% block title %}Attendance{% endblock %}

{% block content %}

<h1>Attendance</h1>

{% for a in attendance %}
    <div class="event-card">
        <p><strong>{{ a.student.username }}</strong></p>
        <p>{{ a.checked_in_at }}</p>
    </div>
{% empty %}
    <p>No one has checked in yet.</p>
{% endfor %}

{% endblock %}
