{% extends "base.html" %}
{% block title %}Badges{% endblock %}

{% block content %}

<h1>Your Badges</h1>

<!-- =========================
     BADGE COLLECTION
========================= -->
<div class="badge-grid">

    {% for ub in user_badges %}
        <div class="badge-card">
            {% if ub.badge.icon %}
                <img src="{{ ub.badge.icon.url }}" alt="{{ ub.badge.name }}">
            {% endif %}

            <h3>{{ ub.badge.name }}</h3>
            <p>{{ ub.badge.description }}</p>
        </div>
    {% empty %}
        <p>You don’t have any badges yet.</p>
    {% endfor %}

</div>

{% endblock %}
