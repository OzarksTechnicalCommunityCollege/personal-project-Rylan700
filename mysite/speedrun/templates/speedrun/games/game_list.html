{% extends "speedrun/base.html" %}

{% block title %}All Games{% endblock %}

{% block content %}

<h1>All Games</h1>

<p>
  <a href="{% url 'speedrun:submit_run' %}">➕ Submit a New Run</a>
</p>

<div class="game-list">
  {% for game in games %}
    <div class="game-card">
      <a href="{% url 'speedrun:game_runs' game=game %}">{{ game }}</a>
    </div>
  {% empty %}
    <p>No games found.</p>
  {% endfor %}
</div>

{% endblock %}
